<svg xmlns="http://www.w3.org/2000/svg" width="500" height="250" viewBox="0 0 500 250">
  <defs>
    <!-- Gradient for Frame A -->
    <linearGradient id="gradA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2333" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Clip Path for Frame C -->
    <clipPath id="clipC">
      <rect x="40" y="140" width="200" height="80" rx="8" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="250" fill="#0d1117" />

  <!-- Frame A: Clean Border -->
  <g>
    <rect x="40" y="20" width="200" height="80" rx="8" fill="url(#gradA)" stroke="#58a6ff" stroke-width="2" />
    <circle cx="52" cy="32" r="2" fill="#58a6ff" />
    <text x="140" y="64" fill="#e6edf3" font-family="sans-serif" font-size="13" text-anchor="middle">Clean Border</text>
    <text x="140" y="120" fill="#9aa4af" font-family="sans-serif" font-size="11" text-anchor="middle">Frame A: Clean Border</text>
  </g>

  <!-- Frame B: Container -->
  <g>
    <rect x="260" y="20" width="200" height="80" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2" />
    <!-- Thicker top edge using Arc to perfectly match rx=8 -->
    <path d="M 260 28 A 8 8 0 0 1 268 20 L 452 20 A 8 8 0 0 1 460 28" fill="none" stroke="#58a6ff" stroke-width="4" />
    <!-- Chevron down -->
    <polygon points="442,87 452,87 447,93" fill="#58a6ff" opacity="0.6" />
    <text x="360" y="64" fill="#e6edf3" font-family="sans-serif" font-size="13" text-anchor="middle">Container</text>
    <text x="360" y="120" fill="#9aa4af" font-family="sans-serif" font-size="11" text-anchor="middle">Frame B: Container</text>
  </g>

  <!-- Frame C: Entity -->
  <g>
    <rect x="40" y="140" width="200" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <rect x="40" y="140" width="3" height="80" fill="#58a6ff" clip-path="url(#clipC)" />
    <!-- Info circle -->
    <circle cx="225" cy="153" r="6" stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.5" />
    <text x="225" y="156.5" fill="#58a6ff" opacity="0.5" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="bold">i</text>
    <text x="140" y="184" fill="#e6edf3" font-family="sans-serif" font-size="13" text-anchor="middle">Entity</text>
    <text x="140" y="240" fill="#9aa4af" font-family="sans-serif" font-size="11" text-anchor="middle">Frame C: Entity</text>
  </g>

  <!-- Frame D: External -->
  <g opacity="0.7">
    <rect x="260" y="140" width="200" height="80" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="6 4" />
    <text x="360" y="184" fill="#6e7681" font-family="sans-serif" font-size="12" text-anchor="middle">External</text>
    <text x="360" y="240" fill="#9aa4af" font-family="sans-serif" font-size="11" text-anchor="middle">Frame D: External</text>
  </g>
</svg>
